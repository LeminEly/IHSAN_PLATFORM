users
├── _id : ObjectId
├── nom : String
├── prenom : String
├── telephone : String (unique, index)
├── password : String (hashé avec bcrypt)
├── photo : String (optionnel)
├── role : Enum(
│   "donneur",
│   "validateur",
│   "partenaire",
│   "admin"
│ )
├── score_reputation : Number (default: 0)
├── est_verifie : Boolean (default: false)
├── status : Enum(
│   "en_attente",
│   "actif",
│   "suspendu",
│   "refuse"
│ )
├── quartier : String (optionnel, utile pour validateur)
├── last_login : Date
├── createdAt : Date
└── updatedAt : Date

beneficiaires
├── _id : ObjectId
├── code_interne : String (unique, index)
├── quartier : String (index)
├── taille_famille : Number
├── description_besoin : String
├── enregistre_par : ObjectId (ref → users, role = validateur)
├── statut : Enum(
│   "actif",
│   "aide_en_cours",
│   "aide_terminee"
│ )
├── createdAt : Date
└── updatedAt : Date

besoins
├── _id : ObjectId
├── type_aide : Enum(
│   "iftar",
│   "alimentaire",
│   "medical",
│   "zakat",
│   "autre"
│ )
├── description : String
├── quartier : String (index)
├── montant_requis : Number
├── montant_collecte : Number (default: 0)
├── statut : Enum(
│   "ouvert",
│   "finance",
│   "confirme",
│   "expire"
│ )
├── validateur_id : ObjectId (ref → users, role = validateur)
├── beneficiaire_id : ObjectId (ref → beneficiaires)
├── geo_localisation :
│   ├── type : "Point"
│   └── coordinates : [longitude, latitude]
├── date_limite : Date
├── createdAt : Date
└── updatedAt : Date

dons
├── _id : ObjectId
├── donneur_id : ObjectId (ref → users, role = donneur)
├── besoin_id : ObjectId (ref → besoins)
├── montant : Number
├── identifiant_transaction : String (unique, index)
├── methode_paiement : Enum(
│   "applications_bancaires",
│   "carte",
│   "especes"
│ )
├── statut : Enum(
│   "en_attente",
│   "paye",
│   "confirme",
│   "annule"
│ )
├── empreinte_recu : String (index)
├── empreinte_blockchain : String (optionnel)
├── date_paiement : Date
├── date_confirmation : Date
├── createdAt : Date
└── updatedAt : Date


preuves_impact
├── _id : ObjectId
├── don_id : ObjectId (ref → dons, unique)
├── validateur_id : ObjectId (ref → users, role = validateur)
├── photo_url : String
├── message_confirmation : String
├── note_validateur : String (optionnel)
├── date_confirmation : Date
├── createdAt : Date
└── updatedAt : Date

registre_public
├── _id : ObjectId
├── identifiant_transaction : String (unique)
├── montant : Number
├── quartier : String
├── type_aide : String
├── empreinte : String
├── horodatage : Date
└── blockchain_ancree : Boolean


notifications
├── _id : ObjectId
├── utilisateur_id : ObjectId (ref → users)
├── type : Enum(
│   "don",
│   "confirmation",
│   "systeme"
│ )
├── message : String
├── lu : Boolean (default: false)
├── createdAt : Date
